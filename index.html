d%22%20opacity%3D%220.45%22/%3E%0A%20%20%3Ccircle%20cx%3D%22128%22%20cy%3D%22128%22%20r%3D%2282%22%20fill%3D%22none%22%20stroke%3D%22url%28%23gold%29%22%20stroke-width%3D%2213%22%20filter%3D%22url%28%23shadow%29%22/%3E%0A%20%20%3Cpath%20d%3D%22M128%20149V67%22%20fill%3D%22none%22%20stroke%3D%22url%28%23gold%29%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%20%20%3Cpath%20d%3D%22M128%2047L145%2078H111Z%22%20fill%3D%22url%28%23gold%29%22/%3E%0A%20%20%3Cpath%20d%3D%22M159%20145L207%20173%22%20fill%3D%22none%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22/%3E%0A%20%20%3Cpath%20d%3D%22M214%20151L215%20188L183%20170Z%22%20fill%3D%22%23FFFFFF%22/%3E%0A%20%20%3Ccircle%20cx%3D%22128%22%20cy%3D%22129%22%20r%3D%2236%22%20fill%3D%22%2349B0B6%22%20stroke%3D%22%23FFFFFF%22%20stroke-width%3D%2210%22%20filter%3D%22url%28%23soft%29%22/%3E%0A%20%20%3Ctext%20x%3D%22128%22%20y%3D%22150%22%20text-anchor%3D%22middle%22%20font-family%3D%22Arial%2C%20Helvetica%2C%20sans-serif%22%20font-size%3D%2258%22%20font-weight%3D%22800%22%20fill%3D%22url%28%23gold%29%22%3E%24%3C/text%3E%0A%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#ffffff;--bg3:#fff9f5;
  --text:#1f1a16;--text2:#6e6059;--text3:#a89990;
  --border:rgba(120,90,70,0.10);--border2:rgba(120,90,70,0.20);
  --radius:12px;--radius-lg:18px;--radius-xl:24px;
  --brand:#49b0b6;--brand-dark:#337a7f;--brand-light:#e0f5f6;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --red:#c0392b;--red-light:#fdecea;--red-dark:#7d1f16;
  --amber:#BA7517;--amber-light:#FAEEDA;--amber-dark:#633806;
  --shadow-sm:0 2px 8px rgba(0,0,0,0.06);
  --shadow:0 4px 10px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 24px rgba(0,0,0,0.10);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1e1a17;--bg2:#272320;--bg3:#2f2b27;--text:#ede8e2;--text2:#9a9088;--text3:#6a6058;--border:rgba(255,220,180,0.1);--border2:rgba(255,220,180,0.18);--brand-light:#0d3628;--shadow-sm:0 2px 8px rgba(0,0,0,0.3);--shadow:0 4px 20px rgba(0,0,0,0.35);--shadow-lg:0 8px 32px rgba(0,0,0,0.4);}
}

/* ── Auth хуудасны стиль ── */
.auth-wrap{display:none;position:fixed;inset:0;background:var(--bg3);z-index:9999;align-items:center;justify-content:center;padding:20px}
.auth-wrap.show{display:flex}
.auth-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xl);padding:30px 26px;width:100%;max-width:360px;box-shadow:var(--shadow-lg)}
.auth-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:20px}
.auth-logo img{width:44px;height:44px;border-radius:14px}
.auth-logo-name{font-size:20px;font-weight:700;color:var(--brand)}
.auth-logo-sub{font-size:11px;color:var(--text3)}
.auth-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:18px;text-align:center}
.auth-fi{width:100%;font-size:14px;padding:11px 14px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;margin-bottom:10px;display:block;transition:border-color .2s,box-shadow .2s}
.auth-fi:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(73,176,182,0.12)}
.pass-wrap{position:relative;margin-bottom:10px}
.pass-wrap .auth-fi{margin-bottom:0;padding-right:42px}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text2);padding:0;font-size:18px;line-height:1;opacity:0.6;transition:opacity .2s}
.pass-eye:hover{opacity:1}
.forgot-link{text-align:right;margin:-4px 0 10px;font-size:12px}
.forgot-link a{color:var(--brand);cursor:pointer;text-decoration:none;font-weight:500}
.forgot-link a:hover{text-decoration:underline}
.auth-btn{width:100%;padding:12px;font-size:14px;font-weight:700;border-radius:var(--radius);border:none;cursor:pointer;margin-bottom:10px;transition:all .2s;letter-spacing:0.2px}
.auth-btn-p{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;box-shadow:0 3px 12px rgba(73,176,182,0.3)}
.auth-btn-p:hover{opacity:0.92;transform:translateY(-1px);box-shadow:0 5px 16px rgba(73,176,182,0.35)}
.auth-btn-o{background:transparent;color:var(--brand);border:1.5px solid var(--border2)}
.auth-btn-o:hover{background:var(--brand-light);border-color:var(--brand)}
.auth-err{background:#fdecea;color:var(--red);border-radius:var(--radius);padding:8px 11px;font-size:12px;margin-bottom:10px;display:none;border-left:3px solid var(--red)}
.auth-err.show{display:block}
.auth-divider{text-align:center;font-size:12px;color:var(--text3);margin:4px 0 10px}
.auth-lang-opt{padding:8px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.auth-lang-opt:last-child{border-bottom:none}
.auth-lang-opt:hover{background:var(--brand-light);color:var(--brand)}
.auth-user{font-size:11px;color:var(--text2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Custom confirm modal */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:9998;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal-wrap.show{display:flex}
.modal-card{background:var(--bg);border-radius:var(--radius-xl);padding:24px 22px;width:100%;max-width:300px;box-shadow:var(--shadow-lg)}
.modal-msg{font-size:14px;color:var(--text);margin-bottom:18px;line-height:1.6;font-weight:500}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 18px;font-size:13px;font-weight:600;border-radius:var(--radius);cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--text);transition:all .15s}
.modal-btn:hover{background:var(--bg2)}
.modal-btn-ok{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(73,176,182,0.25)}
.modal-btn-ok:hover{opacity:0.9}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.brand{display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#49b0b6,#337a7f);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(73,176,182,0.3)}
.brand-name{font-size:15px;font-weight:700;color:var(--brand)}
.lang-bar{position:relative}
.lang-drop-item{display:block;width:100%;text-align:left;padding:8px 13px;font-size:13px;border-radius:0;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer}
.lang-drop-item:last-child{border-bottom:none}
.lang-drop-item:hover{background:var(--brand-light);color:var(--brand)}
.lang-drop-item.active{color:var(--brand);font-weight:600;background:var(--brand-light)}
.lbtn{padding:3px 9px;font-size:11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.lbtn.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:10px 12px;font-size:12px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;font-weight:500;transition:color .15s}
.nav-btn.active{color:var(--brand);border-bottom:2px solid var(--brand);font-weight:700}
.main{max-width:720px;margin:0 auto;padding:14px}
.section{display:none}.section.active{display:block}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.card-title{font-size:13px;font-weight:700;margin-bottom:11px;color:var(--text)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px;margin-bottom:11px}
.metric{border-radius:var(--radius);padding:10px 12px}
.metric-lbl{font-size:10px;margin-bottom:2px;opacity:.8}
.metric-val{font-size:15px;font-weight:700}
.form-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.fi{flex:1;min-width:80px;font-size:13px;padding:8px 10px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg3);color:var(--text);outline:none;transition:border-color .2s,background .2s}
.fi:focus{border-color:var(--brand);background:var(--bg)}
.btn{padding:8px 14px;font-size:13px;border-radius:var(--radius);cursor:pointer;font-weight:600;border:1.5px solid var(--border2);background:transparent;color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg2)}
.btn-p{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(73,176,182,0.25)}.btn-p:hover{opacity:0.9;transform:translateY(-1px)}
.btn-sm{padding:4px 9px;font-size:11px}
.btn-d{color:var(--red);border-color:transparent}.btn-d:hover{background:var(--red-light)}
.type-toggle{display:flex;gap:0;margin-bottom:9px;border:1.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;box-shadow:var(--shadow-sm)}
.tt-btn{padding:6px 15px;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--text2);font-weight:500;transition:all .15s}
.tt-i{background:var(--green-light);color:var(--green-dark);font-weight:600}
.tt-e{background:var(--red-light);color:var(--red-dark);font-weight:600}
.list-item{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)}
.list-item:last-child{border-bottom:none}
.il{display:flex;flex-direction:column;gap:2px}
.ir{display:flex;align-items:center;gap:7px}
.lbl1{font-size:13px;color:var(--text)}
.lbl2{font-size:11px;color:var(--text2)}
.amt{font-size:13px;font-weight:500}
.amt-i{color:var(--green)}.amt-e{color:var(--red)}
.pbar{height:6px;border-radius:3px;overflow:hidden;background:var(--bg2);margin:3px 0}
.pf{height:100%;border-radius:3px;transition:width .3s}
.empty{text-align:center;padding:18px;color:var(--text3);font-size:12px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid transparent}
.chip .rx{font-size:10px;opacity:.7;cursor:pointer;margin-left:2px}
.cat-mgr{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px;margin-top:9px;box-shadow:var(--shadow-sm)}
.slbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.crow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.cp{width:17px;height:17px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cp.sel{border-color:var(--text)}
.irow{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.ic{width:25px;height:25px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;font-size:14px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.ic.sel{border-color:var(--text)}
.add-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.add-row .fi{flex:1;min-width:80px;font-size:12px;padding:5px 8px}
.period-bar{display:flex;gap:4px;margin-bottom:11px;flex-wrap:wrap}
.pb{padding:4px 9px;font-size:11px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer}
.pb.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px;margin-top:11px}
.ccrd{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:11px;box-shadow:var(--shadow-sm)}
.ctitle{font-size:12px;font-weight:600;margin-bottom:7px}
.dwrap{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.leg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:80px}
.li2{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* Collapsible budget block */
.bblock{border:1.5px solid var(--border2);border-radius:var(--radius-lg);margin-bottom:7px;overflow:hidden;box-shadow:var(--shadow-sm);background:var(--bg)}
.bheader{display:flex;align-items:center;gap:7px;padding:8px 12px;cursor:pointer;user-select:none;background:var(--bg)}
.bheader:hover{background:var(--bg3)}
.bicon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.bbody{padding:9px 12px;border-top:1.5px solid var(--border2);background:var(--bg)}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.asr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--border2);background:var(--bg)}
.asr .fi{flex:1;min-width:80px;font-size:12px;padding:4px 7px}
.ic-sm{width:21px;height:21px;border-radius:4px;cursor:pointer;border:1.5px solid transparent;font-size:12px;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.ic-sm.sel{border-color:var(--text)}
.cp-sm{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.cp-sm.sel{border-color:var(--text)}
.inv-card{background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-lg);padding:11px;margin-bottom:9px;box-shadow:var(--shadow-sm)}
.tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:500}
.gain{color:var(--green-dark);background:var(--green-light)}.loss{color:var(--red-dark);background:var(--red-light)}
.notice{background:var(--brand-light);border-radius:var(--radius);padding:8px 11px;font-size:12px;color:var(--brand-dark);margin-bottom:8px;display:flex;align-items:flex-start;gap:7px;box-shadow:var(--shadow-sm)}
.pcustom{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.pcustom .fi{font-size:12px;padding:5px 8px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
/* Month group header for txn list */
.month-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:var(--bg3);border-radius:var(--radius);margin-bottom:2px;cursor:pointer;user-select:none;margin-top:8px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.month-hdr:first-child{margin-top:0}
.month-hdr-left{display:flex;align-items:center;gap:6px}
.month-hdr-lbl{font-size:11px;font-weight:600;color:var(--brand)}
.month-hdr-sum{font-size:10px;color:var(--text3)}
/* Budget month selector */
.month-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.msb{padding:4px 10px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;min-width:50px;text-align:center;box-shadow:var(--shadow-sm)}
.msb.active{background:var(--brand);color:#fff;border-color:var(--brand);box-shadow:0 2px 8px rgba(73,176,182,0.25)}
/* Budget type toggle */
.btype-toggle{display:flex;gap:0;margin-bottom:11px;border:1.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;width:fit-content;box-shadow:var(--shadow-sm)}
.btype-btn{padding:6px 16px;font-size:13px;border:none;cursor:pointer;background:transparent;color:var(--text2)}
.btype-btn.active{background:var(--brand);color:#fff;font-weight:500}
/* Budget summary total bar */
.budget-total-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--brand-light);border-radius:var(--radius);margin-bottom:11px;border:1px solid rgba(73,176,182,0.2);box-shadow:var(--shadow-sm)}
/* Sub-cat selector dropdown */
.subcat-dropdown{border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);overflow:hidden;margin-top:4px;margin-bottom:6px;box-shadow:var(--shadow)}
.subcat-opt{padding:7px 11px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px}
.subcat-opt:hover{background:var(--bg2)}
.subcat-opt.sel{background:var(--brand-light);color:var(--brand-dark);font-weight:500}
/* Lock icon */

// ── Number formatting with commas ─────────────────────────────────────────
function parseAmt(str){return parseFloat((str||'').toString().replace(/,/g,''))||0;}
function fmt(n){
  const rounded=Math.round(n);
  return CS+rounded.toLocaleString('en-US');
}
function fmtP(n){return (n>=0?'+':'')+n.toFixed(1)+'%';}

// Apply comma formatting to an input element (works for any text input)
function applyCommaFmt(el){
  const sel=el.selectionStart;
  const prevLen=el.value.length;
  const raw=(el.value||'').replace(/,/g,'').replace(/[^0-9.]/g,'');
  if(!raw){el.value='';return;}
  const parts=raw.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  el.value=parts.length>1?parts[0]+'.'+parts[1]:parts[0];
  // restore caret accounting for added commas
  const diff=el.value.length-prevLen;
  try{const np=Math.max(0,sel+diff);el.setSelectionRange(np,np);}catch(e){}
}

// Setup static inputs
function setupAmtInput(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('input',function(){applyCommaFmt(this);});
}

// Setup comma formatting on dynamically generated budget inputs via event delegation
document.addEventListener('input',function(e){
  const el=e.target;
  if(el.tagName==='INPUT'&&el.dataset.amt==='1'){applyCommaFmt(el);}
});

function cN(c){
  if(c.key&&CAT_LABELS[c.key]){const l=CAT_LABELS[c.key][lang];if(l)return l;}

  if(c.names){
    return c.names[lang]||c.names.mn||c.names.en||Object.values(c.names)[0]||c.key||'';
  }
  return c.name||c.key||'';
}

  const arr=type==='income'?incCats:expCats;

}

// Budget helpers
function bKeyFor(cat){return cat.key||cat.name||'';}
function bSubKey(cat,sub){return bKeyFor(cat)+':::'+(sub.key||sub.name||'');}
function budgetYMKey(bKey,month){return `${budgetYear}_${month}_${bKey}`;}
function getBudgetVal(bKey,month){
  // Он+сар тэй шинэ key-г эхлэж хайна
  const ymk=budgetYMKey(bKey,month);
  if(budgets[ymk]!==undefined) return budgets[ymk];
  // Хуучин өгөгдөлтэй нийцтэй байхаар (он оруулаагүй хуучин хэлбэр)
  if(budgets[bKey]&&typeof budgets[bKey]==='object') return budgets[bKey][month]||0;
  return 0;
}
function setBudgetVal(bKey,month,val){
  budgets[budgetYMKey(bKey,month)]=val;
}

// Txn grouped by month
function txnsByMonth(){
  const groups={};
  [...txns].sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t=>{
    const ym=t.date?t.date.substring(0,7):'';
    if(!groups[ym])groups[ym]=[];
    groups[ym].push(t);
  });
  return groups;
}

// ── Period ────────────────────────────────────────────────────────────────
function getPD(){
  const now=new Date();now.setHours(23,59,59,999);let from=new Date(0);
  if(period==='7d'){from=new Date(now);from.setDate(from.getDate()-6);from.setHours(0,0,0,0);}
  else if(period==='1m'){from=new Date(now);from.setMonth(from.getMonth()-1);from.setHours(0,0,0,0);}
  else if(period==='3m'){from=new Date(now);from.setMonth(from.getMonth()-3);from.setHours(0,0,0,0);}
  else if(period==='1y'){from=new Date(now);from.setFullYear(from.getFullYear()-1);from.setHours(0,0,0,0);}
  else if(period==='custom'&&cfrom&&cto){from=new Date(cfrom);from.setHours(0,0,0,0);now.setTime(new Date(cto).setHours(23,59,59,999));}
  return{from,to:now};
}
function fT(){const{from,to}=getPD();return txns.filter(t=>{const d=new Date(t.date);return d>=from&&d<=to;});}
function setPeriod(p,btn){period=p;document.querySelectorAll('.pb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('custom-period').style.display=p==='custom'?'flex':'none';if(p!=='custom')rDash();}

function gCats(){

  // Орлогын ангилал: incCats + bCatsInc-д байгаа боловч incCats-д байхгүй ангиллуудыг нэмнэ
  const merged=[...incCats];
  bCatsInc.forEach(bc=>{
    const key=bc.key||bc.name;

  });

}

function addTransaction(){
  const descRaw=document.getElementById('t-desc').value.trim();
  const amount=parseAmt(document.getElementById('t-amount').value);
  const catName=document.getElementById('t-cat').value;
  const date=document.getElementById('t-date').value;
  const subcatKey=selSubcat||null;
  // subcatKey-аас харуулах нэрийг авна
  let subcatDisplay=null;
  if(subcatKey){
    const cats=curType==='income'?bCatsInc:bCatsExp;
    const cat=cats.find(c=>cN(c)===catName);
    const sb=cat?(cat.subs||[]).find(s=>s.key===subcatKey):null;
    subcatDisplay=sb?cN(sb):subcatKey;
  }
  const desc=descRaw||(subcatDisplay||null);
  if(!desc||!amount||amount<=0)return;
  const catObj=gCats().find(c=>cN(c)===catName);
  const catKey=catObj&&catObj.key?catObj.key:null;
  txns.unshift({id:Date.now(),desc,amount,catName,catKey,subcatName:subcatKey,date,type:curType});
  if(curType==='expense'){
    const d=debts.find(d=>d.name===catName||d.name===desc);if(d)d.remaining=Math.max(0,d.remaining-amount);
    const cat=expCats.find(c=>cN(c)===catName);
    if(cat&&isInv(cat)){const tK=document.getElementById('t-inv-type').value;invests.unshift({id:Date.now()+1,name:desc,typeKey:tK,invested:amount,current:amount,date,autoAdded:true});rInvests();rDonut('inv');}
  }
  document.getElementById('t-desc').value='';
  document.getElementById('t-amount').value='';
  selSubcat=null;subDropOpen=false;
  document.getElementById('t-subcat-label').textContent=L.subcatPh||'Дэд ангилал сонгох';
  document.getElementById('t-subcat-list').style.display='none';
  saveData();rAll();
}

function matchTxnCat(t,catNm,txnType){
  if(t.type!==txnType)return false;
  // catKey байвал key-ээр, үгүй бол catName-ээр тохируулна
  if(t.catKey){
    const cats=txnType==='income'?incCats:expCats;
    const catObj=cats.find(c=>cN(c)===catNm);
    if(catObj&&catObj.key) return t.catKey===catObj.key;
  }
  return t.catName===catNm;
}

function gSpent(catNm,subNm,month){
  const filterM=month?t=>{
    if(!t.date)return false;
    const parts=t.date.split('-');
    return parseInt(parts[1])===month&&parseInt(parts[0])===budgetYear;
  }:_=>true;
  if(subNm){
    // subNm нь дэлгэц дээр харагдах нэр байж болно, харин transaction дотор key хадгалагдсан байдаг.
    const catObj=bCatsExp.find(c=>cN(c)===catNm||c.key===catNm||c.name===catNm);
    const subObj=catObj?(catObj.subs||[]).find(s=>cN(s)===subNm||s.key===subNm||s.name===subNm):null;
    const subKey=subObj?(subObj.key||subObj.name||subNm):subNm;
    return txns.filter(t=>{
      if(!matchTxnCat(t,catNm,'expense')||!filterM(t))return false;
      return t.subcatName===subKey||t.subcatName===subNm||(!t.subcatName&&t.desc===subNm);
    }).reduce((s,t)=>s+t.amount,0);
  }
  return txns.filter(t=>matchTxnCat(t,catNm,'expense')&&filterM(t)).reduce((s,t)=>s+t.amount,0);
}

function gIncome(catNm,month){
  const filterM=month?t=>{
    if(!t.date)return false;
    const parts=t.date.split('-');
    return parseInt(parts[1])===month&&parseInt(parts[0])===budgetYear;
  }:_=>true;
  return txns.filter(t=>matchTxnCat(t,catNm,'income')&&filterM(t)).reduce((s,t)=>s+t.amount,0);
}

  return `<div style="display:flex;height:10px;border-radius:999px;background:#FCEBEB;overflow:hidden;margin:0">

function rBProg(){
  const el=document.getElementById('budget-progress');
  const mo=budgetMonth;const cats=getBCats();
  const isIncomePlan=budgetType==='income';
  const has=cats.some(c=>getBudgetVal(bKeyFor(c),mo)>0||(c.subs||[]).some(s=>getBudgetVal(bSubKey(c,s),mo)>0));
  if(!has){el.innerHTML=`<div class="empty">${L.nobudget}</div>`;return;}
  el.innerHTML=cats.map(cat=>{
    const nm=cN(cat);const subs=cat.subs||[];
    const bk=bKeyFor(cat);
    const catBudget=getBudgetVal(bk,mo);
    const subBudget=subs.reduce((s,sb)=>s+getBudgetVal(bSubKey(cat,sb),mo),0);
    const cb=catBudget+subBudget;
    if(!cb)return '';
    const tot=isIncomePlan?gIncome(nm,mo):gSpent(nm,null,mo);
    const realPct=cb>0?Math.round(tot/cb*100):0;
    const isOver=!isIncomePlan&&tot>cb;
    const overAmt=isOver?tot-cb:0;
    const col=isIncomePlan?(realPct>=100?'#1D9E75':cat.color):cat.color;
    const hasSubs=subs.filter(sb=>getBudgetVal(bSubKey(cat,sb),mo)>0).length>0;
    const isOpen=openBProg.has(bk);
    const safeKey=bk.replace(/'/g,"\'");
    return `<div class="bblock" style="${isOver?'border-color:#e5393540':''}">
      <div class="bheader" ${hasSubs?`onclick="tglBProg('${safeKey}')" style="cursor:pointer"`:'style="cursor:default"'}>
        <div class="bicon" style="background:${cat.color}22">${cat.icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:12px;font-weight:800;color:${cat.color};flex:1">${nm}</span>
            <span style="font-size:10px;color:${isOver?'#A32D2D':'var(--text2)'};font-weight:${isOver?'800':'600'}">${fmt(tot)} / ${fmt(cb)} (${realPct}%)</span>
            ${isOver?`<span class="budget-over-amount">+${fmt(overAmt)}</span>`:''}
          </div>
          ${overBar(tot,cb,col,isOver)}
        </div>
        ${hasSubs?`<span class="chevron${isOpen?' open':''}" style="margin-left:6px">▶</span>`:''}
      </div>
      ${hasSubs&&isOpen?`<div class="bbody" style="padding:8px 12px">
        ${subs.filter(sb=>getBudgetVal(bSubKey(cat,sb),mo)>0).map(sb=>{
          const snm=cN(sb)||sb.key||'';
          const sv=getBudgetVal(bSubKey(cat,sb),mo);
          const ss=isIncomePlan
            ?txns.filter(t=>{
              const ymd=(t.date||'').split('-');
              const subKey=sb.key||sb.name||snm;
              return t.type==='income'&&t.catName===nm&&(t.subcatName===subKey||t.subcatName===snm||(!t.subcatName&&t.desc===snm))&&parseInt(ymd[1])===mo&&parseInt(ymd[0])===budgetYear;
            }).reduce((a,t)=>a+t.amount,0)
            :gSpent(nm,snm,mo);
          const subOver=!isIncomePlan&&ss>sv;
          const subOverAmt=subOver?ss-sv:0;
          const subRealPct=sv>0?Math.round(ss/sv*100):0;
          const sc=isIncomePlan?(subRealPct>=100?'#1D9E75':sb.color):sb.color;
          return `<div style="margin-bottom:8px">

function drawDonut(canvas,data,colors){
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2;
  const R=Math.min(W,H)/2-2, r=R*.52;
  ctx.clearRect(0,0,W,H);
  const total=data.reduce((s,v)=>s+v,0);
  if(!total){
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
    ctx.strokeStyle='rgba(136,135,128,0.15)';ctx.lineWidth=R-r;ctx.stroke();
    return;
  }
  const GAP=0.04;
  let angle=-Math.PI/2;
  // 1-р давхарга: өнгөт хэсгүүд
  data.forEach((v,i)=>{
    const sw=Math.max(0,2*Math.PI*v/total-GAP);
    ctx.beginPath();
    ctx.arc(cx,cy,R,angle+GAP/2,angle+GAP/2+sw);
    ctx.arc(cx,cy,r,angle+GAP/2+sw,angle+GAP/2,true);
    ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];
    ctx.fill();
    angle+=2*Math.PI*v/total;
  });
  // 2-р давхарга: гадна болон дотор хүрээг цэвэрлэх — цагаан тойрог
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle='var(--bg3,#efefea)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='var(--bg3,#efefea)';ctx.lineWidth=1.5;ctx.stroke();
}

function rDonut(type){
  let data=[],colors=[],labels=[],cid,lid;
  const ft=fT();

  function sumByKey(arr,txnType){
    // key болон нэр хоёуланд тохируулж хайна
    arr.forEach(c=>{
      const nm=cN(c);
      const s=ft.filter(t=>{
        if(t.type!==txnType)return false;
        // catKey байвал key-ээр, үгүй бол нэрээр
        if(t.catKey&&c.key) return t.catKey===c.key;
        return t.catName===nm;
      }).reduce((a,t)=>a+t.amount,0);
      if(s>0){data.push(s);colors.push(c.color);labels.push({name:c.icon+' '+nm,val:s,color:c.color});}
    });
  }

  if(type==='inc'){
    cid='c-inc';lid='l-inc';
    // incCats + bCatsInc merge — давхардалгүй
    const allInc=[...incCats];
    bCatsInc.forEach(bc=>{if(!allInc.find(c=>(c.key&&c.key===bc.key)||(c.name&&c.name===bc.name)))allInc.push(bc);});
    sumByKey(allInc,'income');
  }
  else if(type==='exp'){cid='c-exp';lid='l-exp';sumByKey(expCats,'expense');}
  else if(type==='gls'){
    cid='c-gls';lid='l-gls';
    goals.forEach((g,i)=>{
      const manual=Math.max(0,g.saved||0);
      const auto=txns.filter(t=>t.type==='expense'&&(t.catName===g.name||t.desc===g.name||t.subcatName===g.name)).reduce((s,t)=>s+t.amount,0);
      const v=manual+auto;
      if(v>0){const col=PAL[i%PAL.length];data.push(v);colors.push(col);labels.push({name:g.name,val:v,color:col});}
    });
  }
  else if(type==='dbt'){cid='c-dbt';lid='l-dbt';debts.forEach((d,i)=>{if(d.remaining>0){const col=PAL[i%PAL.length];data.push(d.remaining);colors.push(col);labels.push({name:d.name,val:d.remaining,color:col});}});}
  else if(type==='inv'){
    cid='c-inv';lid='l-inv';
    const byT={};invests.forEach(inv=>{byT[inv.typeKey]=(byT[inv.typeKey]||0)+inv.current;});
    const types=INVEST_TYPES_ALL[lang]||INVEST_TYPES_ALL.mn;
    Object.entries(byT).forEach(([k,v])=>{const col=ICOLS[k]||PAL[0];const tObj=types.find(x=>x.k===k);data.push(v);colors.push(col);labels.push({name:(IICONS[k]||'💡')+' '+(tObj?tObj.label:k),val:v,color:col});});
  }

  const canvas=document.getElementById(cid);if(!canvas)return;
  const combined=data.map((v,i)=>({v,color:colors[i],label:labels[i]})).sort((a,b)=>b.v-a.v);
  drawDonut(canvas,combined.map(x=>x.v),combined.map(x=>x.color));
  const leg=document.getElementById(lid);const total=combined.reduce((s,x)=>s+x.v,0);
  leg.innerHTML=combined.length?combined.map(x=>`<div class="li2"><div class="ldot" style="background:${x.color}"></div><span>${x.label.name}: ${total>0?Math.round(x.v/total*100):0}%</span></div>`).join(''):`<span style="font-size:11px;color:var(--text3)">${L.nodata}</span>`;
}

      subs:(c.subs||[]).map(s=>({
        key:s.key||null,
        name:s.name||null,
        names:s.names||null,
        color:s.color
      }))
    }));
    const bCatsIncSave=bCatsInc.map(c=>({
      key:c.key||null,
      name:c.name||null,
      icon:c.icon,
      color:c.color,
      subs:(c.subs||[]).map(s=>({
        key:s.key||null,
        name:s.name||null,
        names:s.names||null,
        color:s.color
      }))
    }));
    const data={txns,goals,debts,invests,budgets,lang,budgetMonth,budgetYear,budgetType,
      lockedCats:Array.from(lockedCats),
      incCatsCustom:incCats.filter(c=>!c.key),

}

function loadData(){
  try{
    const raw=localStorage.getItem(getDBKey());
    if(!raw)return false;
    const data=JSON.parse(raw);
    if(data.txns)txns=data.txns;
    if(data.goals)goals=data.goals.map(g=>({...g,history:g.history||[]}));
    if(data.debts)debts=data.debts;
    if(data.invests)invests=data.invests;
    if(data.budgets)budgets=data.budgets;
    if(data.lang){lang=data.lang;L=LANGS[lang]||LANGS.mn;CS=CURR[lang]||'$';}
    if(data.budgetMonth)budgetMonth=data.budgetMonth;
    if(data.budgetYear)budgetYear=data.budgetYear;
    if(data.budgetType)budgetType=data.budgetType;
    // Товчийг budgetType-тэй синк хийнэ
    document.querySelectorAll('.btype-btn').forEach(b=>b.classList.remove('active'));
    const activeBtn=document.getElementById('btype-'+budgetType);
    if(activeBtn)activeBtn.classList.add('active');
    if(data.lockedCats)lockedCats=new Set(data.lockedCats);
    if(data.incCatsCustom)incCats=[...incCats,...data.incCatsCustom];
    if(data.expCatsCustom)expCats=[...expCats,...data.expCatsCustom];
    // Merge bCats
    function migrateSub(ssub){
      // Хуучин {name:'...'} форматыг шинэ {names:{mn:'...'}} болгоно
      if(ssub.name&&!ssub.names){
        const migrated={...ssub,names:{mn:ssub.name}};
        if(!migrated.key)migrated.key='custom_'+Math.random().toString(36).slice(2);
        delete migrated.name;
        return migrated;
      }
      return ssub;
    }
    function mergeBCats(saved,current){
      if(!saved)return;
      saved.forEach(sv=>{
        const ex=current.find(c=>(sv.key&&c.key===sv.key)||(sv.name&&c.name===sv.name));
        if(ex){
          (sv.subs||[]).forEach(ssub=>{
            const ms=migrateSub(ssub);
            const exSub=ex.subs.find(s=>(ms.key&&s.key===ms.key));
            if(!exSub)ex.subs.push(ms);
            else{
              // Байгаа sub-д шинэ хэлний нэр нэмэх
              if(!exSub.names)exSub.names={};
              if(ms.names)Object.assign(exSub.names,ms.names);
            }
          });
        } else if(sv.name){
          current.push({name:sv.name,icon:sv.icon||'📌',color:sv.color||PAL[0],subs:(sv.subs||[]).map(migrateSub)});
        }
      });
    }
    mergeBCats(data.bCatsExpSave,bCatsExp);
    mergeBCats(data.bCatsIncSave,bCatsInc);
    return true;
  }catch(e){console.warn('Load error:',e);return false;}
}

function exportData(){
  const raw=localStorage.getItem(getDBKey());
  if(!raw){showToast('Хадгалсан өгөгдөл байхгүй');return;}
  const blob=new Blob([raw],{type:'application/json'});

}

// Нэвтрэх
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  if(!email||!pass){err.textContent='Имэйл болон нууц үгээ оруулна уу.';err.classList.add('show');return;}
  btn.textContent='...';btn.disabled=true;
  auth.signInWithEmailAndPassword(email,pass)
    .catch(e=>{
      err.textContent=authErrMsg(e.code);
      err.classList.add('show');
      btn.textContent='Нэвтрэх';btn.disabled=false;
    });
}

// Бүртгүүлэх
function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  const err=document.getElementById('reg-err');
  const btn=document.getElementById('reg-btn');
  if(!email||!pass){err.textContent='Имэйл болон нууц үгээ оруулна уу.';err.classList.add('show');return;}
  if(pass.length<6){err.textContent='Нууц үг 6-аас дээш тэмдэгт байх ёстой.';err.classList.add('show');return;}
  if(pass!==pass2){err.textContent='Нууц үг таарахгүй байна.';err.classList.add('show');return;}
  btn.textContent='...';btn.disabled=true;
  auth.createUserWithEmailAndPassword(email,pass)
    .catch(e=>{
      err.textContent=authErrMsg(e.code);
      err.classList.add('show');
      btn.textContent='Бүртгүүлэх';btn.disabled=false;
    });
}

    if(prevUid!==user.uid){

<script>
(function(){
  function money(n){try{return fmt(n||0)}catch(e){return Math.round(n||0).toLocaleString('en-US')}}
  function pct(n){return isFinite(n)?Math.round(n)+'%':'0%'}
  function monthKeyNow(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')}
  function txMonth(t){return (t.date||'').slice(0,7)}
  function getMonthTx(){var mk=monthKeyNow();return (window.txns||txns||[]).filter(function(t){return txMonth(t)===mk})}
  function coachStats(){
    var mts=getMonthTx();
    var inc=mts.filter(t=>t.type==='income').reduce((s,t)=>s+(+t.amount||0),0);
    var exp=mts.filter(t=>t.type==='expense').reduce((s,t)=>s+(+t.amount||0),0);
    var debt=(debts||[]).reduce((s,d)=>s+(+d.remaining||0),0);
    var monthlyDebt=(debts||[]).reduce((s,d)=>s+(+d.monthly||0),0);
    var saved=(goals||[]).reduce((s,g)=>s+(+g.saved||0),0);
    var target=(goals||[]).reduce((s,g)=>s+(+g.target||0),0);
    var invIn=(invests||[]).reduce((s,i)=>s+(+i.invested||0),0);
    var invCur=(invests||[]).reduce((s,i)=>s+(+i.current||0),0);
    var balance=inc-exp;
    var saveRate=inc?Math.max(0,(inc-exp)/inc*100):0;
    var debtPressure=inc?monthlyDebt/inc*100:0;
    var invReturn=invIn?((invCur-invIn)/invIn*100):0;
    var score=50;
    score += Math.min(25,saveRate*.55);
    score += balance>=0?10:-18;
    score -= Math.min(22,debtPressure*.45);
    score += target?Math.min(12,(saved/target)*12):0;
    score += invIn>0?6:0;
    score=Math.max(0,Math.min(100,Math.round(score)));
    return {mts,inc,exp,balance,debt,monthlyDebt,saved,target,invIn,invCur,saveRate,debtPressure,invReturn,score};
  }
  function coachTone(score){
    if(score>=80)return {title:'Гайхалтай санхүүгийн хэмнэлтэй байна ✨',sub:'Одоо хадгаламж, хөрөнгө оруулалт, өрийн төлөвлөгөөгөө автомат систем болгох шатанд орж байна.'};
    if(score>=60)return {title:'Сайн суурьтай байна 💗',sub:'Жижиг алдагдлыг хаагаад, хуримтлалын хувиа тогтмол болгочихвол маш хурдан хүчтэй болно.'};
    if(score>=40)return {title:'Сэргээх боломж маш өндөр байна 🌱',sub:'Энэ сард хамгийн түрүүнд мөнгөний урсгалаа тодруулж, 1–2 гол зардлыг удирдах хэрэгтэй.'};
    return {title:'Эхлээд аюулгүй сууриа босгоё 🤍',sub:'Одоо зорилго бол төгс байх биш. Өдөр бүр жижиг бүртгэл, жижиг хяналт, жижиг ялалт хийх.'};
  }
  function coachTasks(s){
    var arr=[];
    if(!s.mts.length) arr.push('Өнөөдөр хамгийн эхний 3 гүйлгээгээ бүртгээд мөнгө хаашаа урсаж байгааг хар.');
    if(s.inc>0 && s.exp>s.inc) arr.push('Энэ сарын зарлага орлогоос давсан байна. Хамгийн их гарсан 1 ангиллыг сонгоод 7 хоногийн лимит тавь.');
    if(s.saveRate<10 && s.inc>0) arr.push('Орлого орсон өдөр шууд 5–10%-ийг хуримтлал руу шилжүүлэх “өөртөө эхлээд төл” дүрэм тавь.');
    if(s.debtPressure>35) arr.push('Өрийн сарын төлбөр орлогын 35%-иас өндөр байна. Өндөр хүүтэй өрөө түрүүлж дарах төлөвлөгөө гарга.');
    if(!goals.length) arr.push('Нэг тодорхой хуримтлалын зорилго нэм: нэр, зорилтот дүн, хугацаа 3-ыг заавал бич.');
    if(!invests.length) arr.push('Хөрөнгө оруулалтын хэсэгт эхний ажиглах хөрөнгөө нэмээд “мэдээлэл цуглуулах” зуршил эхлүүл.');
    arr.push('Орой 2 минут: өнөөдөр мөнгөний ямар шийдвэр намайг ирээдүйн өөртөө ойртуулсан бэ? гэж тэмдэглэ.');
    return arr.slice(0,5);
  }
  function renderCoach(){
    var root=document.getElementById('coach-root'); if(!root)return;
    var s=coachStats(), tone=coachTone(s.score), tasks=coachTasks(s);
    var debtHint=s.debtPressure>35?'Анхаарах':'Хэвийн';
    var saveHint=s.saveRate>=20?'Маш сайн':(s.saveRate>=10?'Сайн':'Нэмэгдүүлэх');
    root.innerHTML=`
      <div class="coach-hero" style="--score-deg:${s.score*3.6}deg">
        <div class="coach-kicker">Möngö Coach</div>
        <div class="coach-title">${tone.title}</div>
        <div class="coach-sub">${tone.sub}</div>
        <div class="coach-score-wrap">
          <div class="coach-ring"><div>${s.score}</div></div>
          <div>
            <div style="font-size:13px;font-weight:900;opacity:.92">Санхүүгийн эрүүл мэндийн оноо</div>
            <div class="coach-badges"><span class="coach-badge">${saveHint} хуримтлал</span><span class="coach-badge">${debtHint} өр</span></div>
          </div>
        </div>
      </div>
      <div class="coach-grid">
        <div class="coach-mini"><div class="coach-mini-l">Энэ сарын үлдэгдэл</div><div class="coach-mini-v">${money(s.balance)}</div><div class="coach-mini-h">Орлого ${money(s.inc)} · Зарлага ${money(s.exp)}</div></div>
        <div class="coach-mini"><div class="coach-mini-l">Хуримтлалын хувь</div><div class="coach-mini-v">${pct(s.saveRate)}</div><div class="coach-mini-h">Зорилго: эхний ээлжинд 10%+</div></div>
        <div class="coach-mini"><div class="coach-mini-l">Өрийн дарамт</div><div class="coach-mini-v">${pct(s.debtPressure)}</div><div class="coach-mini-h">Сарын төлбөр / сарын орлого</div></div>
        <div class="coach-mini"><div class="coach-mini-l">Хөрөнгө оруулалтын өгөөж</div><div class="coach-mini-v">${pct(s.invReturn)}</div><div class="coach-mini-h">Оруулсан ${money(s.invIn)} · Одоо ${money(s.invCur)}</div></div>
      </div>
      <div class="card"><div class="card-title">7 хоногийн ухаалаг алхам</div><div class="coach-list">${tasks.map((t,i)=>`<div class="coach-step"><div class="coach-step-n">${i+1}</div><div class="coach-step-t">${t}</div></div>`).join('')}</div>
        <div class="coach-action-row"><button class="coach-action" onclick="showTab('transactions',document.getElementById('nav-transactions'))">Гүйлгээ нэмэх</button><button class="coach-action secondary" onclick="showTab('budget',document.getElementById('nav-budget'))">Төсөв засах</button><button class="coach-action secondary" onclick="showTab('goals',document.getElementById('nav-goals'))">Зорилго нэмэх</button></div>
      </div>`;
  }
  function installCoach(){
    if(document.getElementById('tab-coach'))return;
    var nav=document.querySelector('.nav');
    if(nav){
      var btn=document.createElement('button');btn.className='nav-btn';btn.id='nav-coach';btn.textContent='Coach';btn.onclick=function(){showTab('coach',btn);renderCoach();};nav.appendChild(btn);
    }
    var main=document.querySelector('.main');
    if(main){
      var sec=document.createElement('div');sec.id='tab-coach';sec.className='section';sec.innerHTML='<div id="coach-root"></div>';main.appendChild(sec);
    }
    var oldShowTab=window.showTab;
    window.showTab=function(tab,btn){oldShowTab(tab,btn);if(tab==='coach')setTimeout(renderCoach,0)};
    var oldRDash=window.rDash;
    window.rDash=function(){oldRDash();renderCoach();};
    renderCoach();
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',installCoach);else installCoach();
  setTimeout(installCoach,700);
})();
</script>
